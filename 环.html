<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双环嵌套上下文剩余量组件</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background-color: #f9f9f9;
    margin: 0;
  }

  .context-indicator {
    position: relative;
    width: 120px;
    height: 120px;
  }

  /* 旋转 SVG 使得圆环的起点从 3点钟方向 移动到 12点钟方向 */
  .context-indicator svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  /* 内环：半径较小，固定浅色 */
  .circle-bg {
    fill: none;
    stroke: #e5e7eb; /* 浅灰色 */
    stroke-width: 4; /* 内环线宽 */
  }

  /* 外环：半径较大，深色，表示进度 */
  .circle-progress {
    fill: none;
    stroke: #111827; /* 深色 */
    stroke-width: 6; /* 外环线宽稍粗 */
    stroke-linecap: round; /* 圆润的端点 */
    transition: stroke-dasharray 0.3s ease-in-out;
  }

  /* 演示用的控制面板样式 */
  .controls {
    margin-top: 40px;
    text-align: center;
  }
  
  .controls input[type="range"] {
    width: 200px;
    margin-top: 10px;
  }
</style>
</head>
<body>

  <div class="context-indicator">
    <svg viewBox="0 0 100 100">
      <circle class="circle-bg" cx="50" cy="50" r="35"></circle>
      <circle class="circle-progress" cx="50" cy="50" r="42"></circle>
    </svg>
  </div>

  <div class="controls">
    <label for="contextSlider">模拟上下文剩余量: <span id="sliderValue">100</span>%</label><br>
    <input type="range" id="contextSlider" min="0" max="100" value="100">
  </div>

<script>
  // 获取 DOM 元素
  const circleProgress = document.querySelector('.circle-progress');
  const contextSlider = document.getElementById('contextSlider');
  const sliderValue = document.getElementById('sliderValue');

  // 注意：计算周长时，必须使用外环（动态变化那个环）的半径！
  // 外环半径 r = 42
  const radius = 42;
  const circumference = 2 * Math.PI * radius;

  /**
   * 更新上下文进度的函数
   * @param {number} percent - 剩余百分比 (0 到 100)
   */
  function setProgress(percent) {
    const validPercent = Math.max(0, Math.min(100, percent));
    
    // 计算实线长度
    const visibleLength = (validPercent / 100) * circumference;
    
    // 应用到外环上
    circleProgress.style.strokeDasharray = `${visibleLength} ${circumference}`;
  }

  // 初始化满状态
  setProgress(100);

  // 监听滑动条变化
  contextSlider.addEventListener('input', function(e) {
    const currentValue = e.target.value;
    sliderValue.textContent = currentValue;
    setProgress(currentValue);
  });
</script>

</body>
</html>
